<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魂穿红楼：大观园性格测试</title>
    <style>
        /* 全局古典美学风格升级 */
        body { 
            font-family: 'PingFang SC', 'Noto Serif SC', 'SimSun', sans-serif; 
            background: #fbf8f3; 
            padding: 20px; 
            line-height: 1.7; 
            color: #333;
        }
        .container { 
            max-width: 600px; 
            margin: 40px auto; 
            background: #fff; 
            padding: 35px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(139, 0, 0, 0.05); 
            border: 1px solid #eae2d5;
        }
        h1 {
            color: #8b0000;
            font-size: 26px;
            text-align: center;
            margin-bottom: 10px;
        }
        h3 {
            color: #4a4a4a;
            font-size: 18px;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 15px;
            text-align: center;
            margin-bottom: 30px;
        }
        .hidden { display: none; }
        
        /* 按钮与选项美化 */
        button {
            display: block;
            width: 100%;
            padding: 14px;
            background: #8b0000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 6px rgba(139, 0, 0, 0.2);
        }
        button:hover {
            background: #a31414;
        }
        .option { 
            display: block; 
            width: 100%; 
            padding: 15px 20px; 
            margin: 12px 0; 
            border: 1px solid #e0dcd5; 
            background: #fdfcf9;
            color: #4a4a4a;
            border-radius: 8px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 15px;
            transition: all 0.2s ease;
        }
        .option:hover { 
            background: #f7f1e6; 
            border-color: #8b0000;
            color: #8b0000;
        }

        /* 结果展示卡片 */
        .result-card {
            text-align: center;
            padding: 20px 10px;
        }
        .result-subtitle {
            font-size: 16px;
            color: #8c8c8c;
            display: block;
            margin-bottom: 5px;
        }
        .result-title {
            font-size: 36px;
            color: #8b0000;
            margin: 10px 0;
            font-weight: bold;
        }
        .result-badge {
            display: inline-block;
            padding: 4px 15px;
            background: #f7f1e6;
            color: #b22222;
            border-radius: 20px;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .result-desc {
            text-align: left;
            background: #faf7f2;
            padding: 20px;
            border-left: 4px solid #8b0000;
            border-radius: 4px;
            color: #555;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 35px;
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="welcome-screen">
        <h1>魂穿红楼：大观园生存图鉴</h1>
        <p>你将穿越回钟鸣鼎食的古代大家族，看看你的本命红楼角色是谁？</p>
        <button onclick="startQuiz()">开始测试</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <h3 id="question-text">问题加载中...</h3>
        <div id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        </div>
</div>

<script>
    // --- 【数据池】：完整的 30 道题数据 ---
    const questions = [
        { q: "初入府邸，你该去正堂向老祖宗请安，你的感受是？", options: [{text: "准备大展身手结交一番", score: {in: 2}}, {text: "期待结交投缘的姐妹", score: {in: 1}}, {text: "礼数到了即可，默默观察", score: {out: 1}}, {text: "极度抗拒，想躲回屋里", score: {out: 2}}] },
        { q: "独自游园，你最先被吸引的是？", options: [{text: "亭台的造价与布局", score: {real: 2}}, {text: "适合喝茶吃点心的位置", score: {real: 1}}, {text: "匾额诗句的意境", score: {ideal: 1}}, {text: "整体穿越古今的幽静氛围", score: {ideal: 2}}] },
        { q: "小丫鬟打碎名贵瓷瓶，管家要严惩，你会？", options: [{text: "家规不可废，严肃处理", score: {logic: 2}}, {text: "扣月钱惩戒，按章办事", score: {logic: 1}}, {text: "替她求情，代付赔偿", score: {empathy: 1}}, {text: "护住她，反驳管家", score: {empathy: 2}}] },
        { q: "筹备诗社，你拿到任务后的反应是？", options: [{text: "列出明细表格，万无一失", score: {control: 2}}, {text: "拉个提纲，分派任务", score: {control: 1}}, {text: "定个主题，随缘安排", score: {flow: 1}}, {text: "没有计划，随兴而至", score: {flow: 2}}] },
        { q: "夜宴余波，回到房中你的状态是？", options: [{text: "意犹未尽，复盘八卦", score: {in: 2}}, {text: "心情愉悦，回味瞬间", score: {in: 1}}, {text: "只想赶紧泡脚看书", score: {out: 1}}, {text: "屏蔽世界，倒头就睡", score: {out: 2}}] },
        { q: "婆子贪了冬衣，但因家里困难，你会？", options: [{text: "严肃处理，绝不姑息", score: {logic: 2}}, {text: "私下敲打，补齐即可", score: {logic: 1}}, {text: "假装不知，心生怜悯", score: {empathy: 1}}, {text: "赏钱相助，不仅不追究", score: {empathy: 2}}] },
        { q: "听闻宝玉抱怨功名无用，你想？", options: [{text: "简直胡闹，不切实际", score: {real: 2}}, {text: "可以理解，但要面对现实", score: {real: 1}}, {text: "欣赏他独特的视角", score: {ideal: 1}}, {text: "产生灵魂共鸣", score: {ideal: 2}}] },
        { q: "筹备家宴戏班来不了，你的应对？", options: [{text: "启动备选方案，保证质量", score: {control: 2}}, {text: "商量调整，灵活应对", score: {control: 1}}, {text: "没戏就行酒令，一样热闹", score: {flow: 1}}, {text: "正好，改吃烤肉赏雪", score: {flow: 2}}] },
        { q: "结识受欢迎的新人薛宝琴，你会？", options: [{text: "主动登门，迅速打成一片", score: {in: 2}}, {text: "在聚会中顺其自然熟络", score: {in: 1}}, {text: "远远看着，不刻意结交", score: {out: 1}}, {text: "不感兴趣，只想独处", score: {out: 2}}] },
        { q: "大丫鬟因失职将被赶出，你会？", options: [{text: "规矩大于天，坚决执行", score: {logic: 2}}, {text: "给钱遣散，保障生计", score: {logic: 1}}, {text: "求情保下，哪怕扣自己月钱", score: {empathy: 1}}, {text: "极力维护，不惜争吵", score: {empathy: 2}}] },
        { q: "设计院落，你最看重？", options: [{text: "动线高效，起居实用", score: {real: 2}}, {text: "家具材质，耐用好打理", score: {real: 1}}, {text: "花草错落，四季不同", score: {ideal: 1}}, {text: "清幽意境，绝不流俗", score: {ideal: 2}}] },
        { q: "难得一天的自由，你会？", options: [{text: "读书或理账，充实内心", score: {control: 2}}, {text: "按计划游玩喝茶", score: {control: 1}}, {text: "走到哪算哪，随心所欲", score: {flow: 1}}, {text: "发呆看云，虚度光阴", score: {flow: 2}}] },
        { q: "听到流言蜚语，你的反应？", options: [{text: "当场对质，不可惹", score: {in: 2}}, {text: "记下名字，以后报复", score: {in: 1}}, {text: "无聊恶心，冷处理", score: {out: 1}}, {text: "悲凉难过，想逃离", score: {out: 2}}] },
        { q: "分红发放，你会？", options: [{text: "按绩效分配，赏罚分明", score: {logic: 2}}, {text: "主要按劳，留点后备", score: {logic: 1}}, {text: "大家平分，不想有嫌隙", score: {empathy: 1}}, {text: "全部分掉，大家开心", score: {empathy: 2}}] },
        { q: "对于命运，你信奉？", options: [{text: "事在人为，我命由我", score: {real: 2}}, {text: "顺应规则，安稳结局", score: {real: 1}}, {text: "尽人事听天命", score: {ideal: 1}}, {text: "宿命注定，如梦一场", score: {ideal: 2}}] },
        { q: "如果让你掌管对牌，心境是？", options: [{text: "大喜，大展身手", score: {in: 2}}, {text: "欣然，锻炼能力", score: {in: 1}}, {text: "推辞，只挂虚名", score: {out: 1}}, {text: "拒绝，绝对不干", score: {out: 2}}] },
        { q: "闲暇时书房抽书，你会抽？", options: [{text: "算学账本，安身立命", score: {real: 2}}, {text: "民间话本，解闷放松", score: {real: 1}}, {text: "诗词歌赋，品味雅趣", score: {ideal: 1}}, {text: "玄学哲学，探究宇宙", score: {ideal: 2}}] },
        { q: "春游赏花，你的安排是？", options: [{text: "提前规划，一丝不苟", score: {control: 2}}, {text: "提前招呼，大概计划", score: {control: 1}}, {text: "不刻意安排，临时起意", score: {flow: 1}}, {text: "走到哪算哪，随遇而安", score: {flow: 2}}] },
        { q: "探望不熟且有摩擦的病人，你会？", options: [{text: "礼数周全，不过问私事", score: {logic: 2}}, {text: "探望一下，维持体面", score: {logic: 1}}, {text: "放下芥蒂，宽慰几句", score: {empathy: 1}}, {text: "亲自下厨，温暖对方", score: {empathy: 2}}] },
        { q: "面对抄家流言，你的反应？", options: [{text: "盘点私房，制定退路", score: {control: 2}}, {text: "约束下人，静观其变", score: {control: 1}}, {text: "随波逐流，得过且过", score: {flow: 1}}, {text: "坦然接受，悲壮美学", score: {flow: 2}}] },
        { q: "面对权贵，你会？", options: [{text: "精心打扮，铺路前程", score: {in: 2}}, {text: "不卑不亢，礼貌应对", score: {in: 1}}, {text: "低调混迹，不求注意", score: {out: 1}}, {text: "找借口不去，清静喂鸟", score: {out: 2}}] },
        { q: "选择夫婿，你最看重？", options: [{text: "家世与搞钱能力", score: {real: 2}}, {text: "人品负责，性格稳定", score: {real: 1}}, {text: "志趣相投，聊得来", score: {ideal: 1}}, {text: "灵魂契合，懂我欲言又止", score: {ideal: 2}}] },
        { q: "下人争抢财物，你会？", options: [{text: "各打五十大板，收回赏赐", score: {logic: 2}}, {text: "查明缘由，严厉惩罚", score: {logic: 1}}, {text: "谈心化解，讲道理", score: {empathy: 1}}, {text: "自掏腰包，补齐分发", score: {empathy: 2}}] },
        { q: "才艺遇到瓶颈，你会？", options: [{text: "严格练习，死磕到底", score: {control: 2}}, {text: "虚心请教，继续坚持", score: {control: 1}}, {text: "先放一放，有兴致再说", score: {flow: 1}}, {text: "果断放弃，改换赛道", score: {flow: 2}}] },
        { q: "被长辈误解，你会？", options: [{text: "有理有据，当场解释", score: {in: 2}}, {text: "忍住当场，事后解释", score: {in: 1}}, {text: "清者自清，冷处理", score: {out: 1}}, {text: "内心内耗，独自落泪", score: {out: 2}}] },
        { q: "清理旧物，你会？", options: [{text: "盘点有用，高效整理", score: {real: 2}}, {text: "回忆趣事，干脆利落", score: {real: 1}}, {text: "感叹人生，诗兴大发", score: {ideal: 1}}, {text: "沉浸过去，无法自拔", score: {ideal: 2}}] },
        { q: "闺蜜犯错求助，你会？", options: [{text: "坚决不借，原则第一", score: {logic: 2}}, {text: "不借但帮出谋划策", score: {logic: 1}}, {text: "借钱相助，渡过难关", score: {empathy: 1}}, {text: "当掉首饰，倾囊相助", score: {empathy: 2}}] },
        { q: "下人不懂规矩，房间乱了，你会？", options: [{text: "立规矩，一丝不苟", score: {control: 2}}, {text: "教核心习惯，其他随缘", score: {control: 1}}, {text: "懒得教，找得到就行", score: {flow: 1}}, {text: "干脆换种布置，换心情", score: {flow: 2}}] },
        { q: "获得满堂喝彩，你会？", options: [{text: "享受焦点，热情互动", score: {in: 2}}, {text: "谦虚道谢，内心认可", score: {in: 1}}, {text: "尴尬不适，想离开", score: {out: 1}}, {text: "厌烦虚荣，觉得肤浅", score: {out: 2}}] },
        { q: "梦醒时分，你最留恋？", options: [{text: "锦衣玉食的尊贵感", score: {real: 2}}, {text: "热闹温暖的人际氛围", score: {real: 1}}, {text: "风雅美好的诗意瞬间", score: {ideal: 1}}, {text: "宿命般的灵魂体验", score: {ideal: 2}}] }
    ];

    // --- 【角色结果描述池】 ---
    const characterProfiles = {
        "薛宝钗": { title: "定海神针", desc: "你是大观园中的秩序守护者。务实、沉稳、统筹全局，你总能在混乱中理出头绪，是所有人心中最可靠的支柱。" },
        "林黛玉": { title: "空谷幽兰", desc: "你是红楼中最纯粹的灵魂。敏感、诗意、追求极致的精神世界，哪怕历经繁华落尽，也始终保持着灵魂的高洁。" },
        "贾探春": { title: "破晓玫瑰", desc: "你有敏锐的远见与雷厉风行的手段。敢于破局，心中装有家族的兴衰，你是那朵在大观园中傲然盛开的带刺玫瑰。" },
        "史湘云": { title: "快意游侠", desc: "你有着超乎常人的豪爽与洒脱。不拘小节，乐观豁达，无论身处何地，都能活出生命本真的热烈与自在。" },
        "妙玉": { title: "高山飞雪", desc: "你拥有极高的审美与内省精神。孤傲独立，不染凡尘，在喧嚣的世界中守着那一抹属于自己的宁静与信仰。" },
        "袭人": { title: "春风化雨", desc: "你温柔、细腻、极具责任感。总能在细微处给予他人关怀，你是那个让环境变得有序且温暖的隐形力量。" },
        "晴雯": { title: "烈火繁花", desc: "你真实、张扬、有着精湛的手艺。不甘受缚，敢爱敢恨，生命虽如烟花般短暂，却留下了最绚烂的痕迹。" },
        "薛宝琴": { title: "长风飞鸟", desc: "你拥有开阔的视野与好奇心。见多识广，心胸宽广，像一只自由的飞鸟，不受世俗枷锁的限制。" },
        "平儿": { title: "玲珑暖玉", desc: "你处事周全，共情力极强。在错综复杂的人际中游刃有余，既能成全他人，又能护住自己，温润而有力量。" },
        "李纨": { title: "沉静古木", desc: "你稳健、克制、守序。经历过风雨后，你内心如古木般沉静，默默守护着属于自己的一方天地。" },
        "香菱": { title: "寻梦幼鹿", desc: "你纯善、执着、内心藏着无限的温柔。即便命运坎坷，也从未磨灭你对美好事物的追求与热望。" },
        "惜春": { title: "凛冽寒星", desc: "你冷静、理智、有着超脱的旁观者视角。当别人沉溺于繁华，你已看透真相，选择独善其身。" },
        "紫鹃": { title: "智谋隐士", desc: "你机敏、忠诚、周全。虽处于从属地位，却有着洞悉一切的智慧，是你所珍视之人最坚实的后盾。" },
        "小红": { title: "破浪小舟", desc: "你敏捷、进取、务实。不甘于现状，总能抓住稍纵即逝的机会，勇敢地驶向更广阔的江海。" },
        "芳官": { title: "炽热星辰", desc: "你叛逆、热烈、充满表现力。不愿被规则定义，像一颗炽热的星辰，用独特的方式点亮自己的生命。" },
        "鸳鸯": { title: "磐石利刃", desc: "你有着极强的决断力与原则底线。清醒独立，在关键时刻能迸发出不可动摇的力量，守护自己的尊严。" }
    };

    // --- 【逻辑控制引擎】 ---
    let currentQ = 0;
    // 对应初始化 4 个对立维度核心分值池
    let scores = { in: 0, out: 0, real: 0, ideal: 0, logic: 0, empathy: 0, control: 0, flow: 0 };

    function startQuiz() {
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentQ];
        document.getElementById('question-text').innerText = (currentQ + 1) + ". " + q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt.text;
            // 修复 bug: 传入确切的单个选项 score 对象
            btn.onclick = () => selectOption(opt.score);
            container.appendChild(btn);
        });
    }

    function selectOption(scoreObj) {
        // 动态合并计分
        if (scoreObj) {
            for(let key in scoreObj) {
                if (scores.hasOwnProperty(key)) {
                    scores[key] += scoreObj[key];
                }
            }
        }
        
        currentQ++;
        if(currentQ < questions.length) {
            renderQuestion();
        } else {
            showResult();
        }
    }

    // 自动化 4 维性格编码匹配矩阵
    function calculateCharacter(scores) {
        const d1 = scores.in >= scores.out ? "in" : "out";
        const d2 = scores.real >= scores.ideal ? "real" : "ideal";
        const d3 = scores.logic >= scores.empathy ? "logic" : "empathy";
        const d4 = scores.control >= scores.flow ? "control" : "flow";
        
        const userCode = `${d1}_${d2}_${d3}_${d4}`;

        const codeToCharacter = {
            "in_real_logic_control": "薛宝钗",
            "in_real_logic_flow": "小红",
            "in_real_empathy_control": "袭人",
            "in_real_empathy_flow": "史湘云",
            
            "in_ideal_logic_control": "贾探春",
            "in_ideal_logic_flow": "芳官",
            "in_ideal_empathy_control": "薛宝琴",
            "in_ideal_empathy_flow": "香菱",
            
            "out_real_logic_control": "李纨",
            "out_real_logic_flow": "鸳鸯",
            "out_real_empathy_control": "平儿",
            "out_real_empathy_flow": "晴雯",
            
            "out_ideal_logic_control": "惜春",
            "out_ideal_logic_flow": "妙玉",
            "out_ideal_empathy_control": "紫鹃",
            "out_ideal_empathy_flow": "林黛玉"
        };

        return codeToCharacter[userCode] || "林黛玉";
    }

    // 展示最终文本式精美卡片结果页
    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        const resultScreen = document.getElementById('result-screen');
        resultScreen.classList.remove('hidden');
        
        const finalCharacter = calculateCharacter(scores); 
        const profile = characterProfiles[finalCharacter];
        
        // 使用规范的语义化标签重新渲染结果界面
        resultScreen.innerHTML = `
            <div class="result-card">
                <span class="result-subtitle">你的红楼命定人格：</span>
                <div class="result-title">${finalCharacter}</div>
                <div class="result-badge">「${profile.title}」</div>
                <div class="result-desc">${profile.desc}</div>
                <button onclick="location.reload()">重新测试</button>
            </div>
        `;
        console.log("最终维度计分核算：", scores);
    }
</script>
